<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioAg Genetics Lab</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="lab-card">
        <header>
            <h1>🧬 BioAg Genetics Lab</h1>
            <div class="custom-select-wrapper">
                <label for="animal-select">Select Species</label>
                <div class="select-container">
                    <select id="animal-select">
                        <option value="cow">🐄 Bovine (Black/Red)</option>
                        <option value="sheep">🐑 Ovine (White/Black)</option>
                        <option value="pig">🐖 Porcine (Pink/Black)</option>
                        <option value="horse">🐎 Equine (Bay/Chestnut)</option>
                    </select>
                    <span class="custom-arrow"></span>
                </div>
            </div>
        </header>

        <section class="input-grid">
            <div class="parent-box">
                <label>Sire (Father)</label>
                <input type="text" id="p1" value="Bb" maxlength="2">
            </div>
            <div class="parent-box">
                <label>Dam (Mother)</label>
                <input type="text" id="p2" value="Bb" maxlength="2">
            </div>
        </section>

        <button id="run-btn">Run Genetic Cross</button>
        <button id="reset-btn" onclick="resetLab()">Reset Lab</button>

        <div id="visual-results">
            <table id="punnett-table"></table>
        </div>

        <div id="stats-panel"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
