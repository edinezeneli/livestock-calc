<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioAg Genetics Lab</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="lab-card">
      <header>
        <h1>🧬 BioAg Genetics Lab</h1>
        <label for="animal-select">Select Livestock:</label>
        <select id="animal-select">
            <option value="cow">🐄 Cow (Black/Red)</option>
            <option value="sheep">🐑 Sheep (White/Black)</option>
            <option value="pig">🐖 Pig (Pink/Black)</option>
            <option value="horse">🐎 Horse (Bay/Chestnut)</option>
        </select>
    </header>

        <form id="cross-form" novalidate>
            <section class="input-grid">
                <div class="parent-box">
                    <label for="p1">Sire (Father)</label>
                    <input type="text" id="p1" value="Bb" maxlength="2" inputmode="text" autocapitalize="off" autocomplete="off" spellcheck="false" aria-describedby="genotype-help error-message">
                </div>
                <div class="parent-box">
                    <label for="p2">Dam (Mother)</label>
                    <input type="text" id="p2" value="Bb" maxlength="2" inputmode="text" autocapitalize="off" autocomplete="off" spellcheck="false" aria-describedby="genotype-help error-message">
                </div>
            </section>

            <p id="genotype-help" class="helper-text">Enter exactly two alleles per parent using only B or b, such as <strong>Bb</strong> or <strong>bb</strong>.</p>
            <p id="error-message" class="error-message" role="alert" aria-live="assertive"></p>

            <button id="run-btn" type="submit">Run Genetic Cross</button>
        </form>

        <div id="visual-results">
            <table id="punnett-table" aria-label="Punnett square results"></table>
        </div>

        <div id="stats-panel" aria-live="polite"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
